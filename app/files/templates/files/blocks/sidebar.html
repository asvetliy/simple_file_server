{% load i18n %}
<div class="mb-8 rounded-2xl border border-base-300 bg-base-200/70 p-4">
  <a href="{% url 'home' %}" class="flex items-center gap-3 text-xl font-bold tracking-tight">
    <span class="grid h-10 w-10 place-items-center rounded-xl bg-primary text-primary-content shadow-sm">S</span>
    {% trans 'Simple Drive' %}
  </a>
  <p class="mt-1 text-sm text-base-content/60">{% trans 'Private file sharing' %}</p>
</div>
<ul class="menu gap-1">
  <li>
    <a href="{% url 'home' %}" class="font-medium">
      <i data-lucide="home" class="h-4 w-4"></i>
      <span>Home</span>
    </a>
  </li>
  <li>
    <a href="{% url 'files-dashboard' %}" class="{% if title_category == 'Dashboard' %}active {% endif %}font-medium">
      <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
      <span>Dashboard</span>
    </a>
  </li>
  <li>
    <a href="{% url 'files-index' %}" class="{% if title_category == 'File Explorer' %}active {% endif %}font-medium">
      <i data-lucide="files" class="h-4 w-4"></i>
      <span>File Explorer</span>
    </a>
  </li>
  <li>
    <a href="{% url 'files-trash' %}" class="{% if title_category == 'Trash' %}active {% endif %}font-medium">
      <i data-lucide="trash-2" class="h-4 w-4"></i>
      <span>Trash</span>
    </a>
  </li>
</ul>
