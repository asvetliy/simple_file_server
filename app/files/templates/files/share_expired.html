{% load static i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <title>{% trans 'Share expired' %}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <main class="grid min-h-screen place-items-center p-4">
    <section class="w-full max-w-md rounded-box border border-base-300 bg-base-100 p-6 text-center shadow-xl">
      <div class="mx-auto grid h-14 w-14 place-items-center rounded-2xl bg-error/10 text-error">
        <i data-lucide="timer-off" class="h-7 w-7"></i>
      </div>
      <h1 class="mt-4 text-2xl font-bold">{% trans 'This share link has expired' %}</h1>
      <p class="mt-2 text-sm text-base-content/60">{% trans 'Ask the file owner to create a new share link.' %}</p>
      <a class="btn btn-primary mt-6" href="{% url 'home' %}">{% trans 'Go home' %}</a>
    </section>
  </main>
  <script>document.addEventListener('DOMContentLoaded', function () { if (window.lucide) window.lucide.createIcons(); });</script>
</body>
</html>
