{% load static i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>{% trans 'Simple Drive' %} - {% trans 'Server error' %}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="76x76" href="{% static 'img/apple-icon.png' %}">
  <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <main class="grid min-h-screen place-items-center px-4 py-12">
    <section class="w-full max-w-lg rounded-lg border border-base-300 bg-base-100 p-8 text-center shadow-xl">
      <div class="mx-auto grid h-16 w-16 place-items-center rounded-lg bg-error/10 text-error">
        <i data-lucide="server-crash" class="h-8 w-8"></i>
      </div>
      <p class="mt-6 text-sm font-semibold uppercase text-error">500</p>
      <h1 class="mt-2 text-4xl font-bold">{% trans 'Something went wrong' %}</h1>
      <p class="mt-4 text-base-content/70">
        {% trans 'The server hit an unexpected error. Please try again in a moment.' %}
      </p>
      <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
        <a class="btn btn-primary gap-2" href="{% url 'home' %}">
          <i data-lucide="home" class="h-4 w-4"></i>
          {% trans 'Go home' %}
        </a>
        <a class="btn btn-outline gap-2" href="{% url 'user-login' %}">
          <i data-lucide="log-in" class="h-4 w-4"></i>
          {% trans 'Log in' %}
        </a>
      </div>
    </section>
  </main>
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
